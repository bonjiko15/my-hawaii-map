<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hawaii Travel Map 🌺</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --popup-bg: rgba(10, 22, 40, 0.97);
      --popup-border: rgba(249, 168, 37, 0.6);
      --popup-color: #fff;
      --popup-desc: #b0c4de;
      --popup-tip-bg: rgba(10,22,40,0.92);
      --scale-color: #fff;
      --scale-shadow: 0 1px 3px rgba(0,0,0,0.9);
    }
    body.theme-light {
      --popup-bg: rgba(255,255,255,0.97);
      --popup-border: rgba(249, 168, 37, 0.8);
      --popup-color: #1a1a2e;
      --popup-desc: #445566;
      --popup-tip-bg: rgba(255,255,255,0.95);
      --scale-color: #333;
      --scale-shadow: 0 1px 3px rgba(255,255,255,0.5);
    }

    body { font-family: 'Georgia', serif; background: #0a1628; color: #fff; height: 100dvh; display: flex; flex-direction: column; }

    header {
      background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #f9a825;
      z-index: 1000;
      flex-wrap: wrap;
      transition: padding 0.3s;
    }
    header.collapsed { padding: 8px 16px; }
    header.collapsed .legend { display: none; }
    #toggle-header {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ccc;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.72rem;
      white-space: nowrap;
      transition: background 0.2s;
      touch-action: manipulation;
    }
    #toggle-header:hover { background: rgba(255,255,255,0.15); color: #fff; }
    header h1 {
      font-size: 1.2rem;
      background: linear-gradient(90deg, #f9a825, #ff6b6b, #4ecdc4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .legend {
      display: flex;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #ccc;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      transition: all 0.2s;
      user-select: none;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .legend-item:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .legend-item.active {
      color: #fff;
      border-color: currentColor;
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 8px rgba(255,255,255,0.2);
    }
    .legend-item.dimmed { opacity: 0.35; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      flex-shrink: 0;
    }

    /* スマホ用 */
    @media (max-width: 600px) {
      header { padding: 8px 12px; gap: 8px; }
      header h1 { font-size: 1rem; letter-spacing: 0.5px; }
      .legend {
        width: 100%;
        margin-left: 0;
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 2px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .legend::-webkit-scrollbar { display: none; }
      #toggle-header { margin-left: auto; font-size: 0.68rem; padding: 3px 8px; }
      .leaflet-control-zoom { margin-top: 8px !important; margin-left: 8px !important; }
      .leaflet-control-scale { margin-bottom: 12px; margin-left: 8px; }
    }

    #map { flex: 1; }

    /* スケールバー（Google Maps風） */
    .leaflet-control-scale-line {
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--scale-color);
      border-left: 2px solid var(--scale-color);
      border-right: 2px solid var(--scale-color);
      color: var(--scale-color);
      font-size: 11px;
      font-weight: 600;
      font-family: Arial, sans-serif;
      letter-spacing: 0.5px;
      padding: 2px 6px 3px;
      white-space: nowrap;
      text-shadow: var(--scale-shadow);
      box-shadow: none;
      line-height: 1.4;
    }
    .leaflet-control-scale { margin-bottom: 24px; margin-right: 12px; }

    /* リッチポップアップ */
    .leaflet-popup-content-wrapper {
      background: var(--popup-bg);
      border: 1px solid var(--popup-border);
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      padding: 0;
      overflow: hidden;
    }
    .leaflet-popup-content { color: var(--popup-color); margin: 0; min-width: 220px; max-width: min(260px, 80vw); }
    .leaflet-popup-tip { background: var(--popup-bg); }
    .leaflet-popup-close-button { color: #aaa !important; font-size: 18px !important; top: 8px !important; right: 10px !important; }

    .rich-popup-img {
      width: 100%; height: 140px;
      object-fit: cover;
      display: block;
    }
    .rich-popup-body { padding: 12px 14px 14px; }
    .rich-popup-emoji { font-size: 1.2rem; margin-bottom: 4px; }
    .rich-popup-title { font-size: 0.95rem; font-weight: bold; color: #f9a825; margin-bottom: 6px; }
    .rich-popup-category {
      display: inline-block; font-size: 0.68rem;
      padding: 2px 7px; border-radius: 10px;
      margin-bottom: 8px; font-weight: bold;
    }
    .rich-popup-desc { font-size: 0.8rem; color: var(--popup-desc); line-height: 1.5; margin-bottom: 6px; }
    .rich-popup-hours { font-size: 0.75rem; color: #86efac; margin-bottom: 6px; }
    .rich-popup-link { display: inline-block; font-size: 0.73rem; color: #60a5fa; text-decoration: none; }
    .rich-popup-link:hover { text-decoration: underline; }

    /* ホテルビーコン */
    @keyframes pulse-ring {
      0%   { transform: scale(0.5); opacity: 0.8; }
      100% { transform: scale(2.8); opacity: 0; }
    }
    .hotel-beacon {
      position: relative;
      width: 20px; height: 20px;
    }
    .hotel-beacon .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(250, 204, 21, 0.35);
      animation: pulse-ring 2s ease-out infinite;
    }
    .hotel-beacon .ring:nth-child(2) { animation-delay: 0.7s; }
    .hotel-beacon .dot {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #facc15;
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px;
      box-shadow: 0 0 10px #facc1588;
      z-index: 1;
    }
    .meetup-beacon .ring {
      background: rgba(52, 211, 153, 0.35);
    }
    .meetup-beacon .dot {
      background: #34d399;
      box-shadow: 0 0 10px #34d39988;
    }
    .hotel-label {
      position: absolute;
      top: -28px; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: rgba(10,22,40,0.92);
      color: #facc15;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 8px;
      border: 1px solid #facc1566;
      pointer-events: none;
      letter-spacing: 0.3px;
    }
    .meetup-label {
      position: absolute;
      top: -28px; left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: rgba(10,22,40,0.92);
      color: #34d399;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 8px;
      border: 1px solid #34d39966;
      pointer-events: none;
      letter-spacing: 0.3px;
    }
    .leaflet-popup-content { color: #fff; margin: 14px 16px; min-width: 180px; }

    .popup-title {
      font-size: 1rem;
      font-weight: bold;
      color: #f9a825;
      margin-bottom: 6px;
    }
    .popup-category {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    .popup-desc { font-size: 0.82rem; color: #b0c4de; line-height: 1.5; }
    .popup-emoji { font-size: 1.4rem; margin-bottom: 4px; }

    /* ホバーカード（画面右下）- タッチデバイスでは非表示 */
    @media (hover: none) {
      #hover-card { display: none !important; }
    }
    #hover-card {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 300px;
      background: rgba(10, 22, 40, 0.97);
      border: 2px solid rgba(249, 168, 37, 0.7);
      border-radius: 16px;
      padding: 16px 20px;
      z-index: 2000;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      box-shadow: 0 8px 40px rgba(249,168,37,0.2);
    }
    #hover-card.visible {
      transform: translateY(0);
      opacity: 1;
    }
    #hover-card .card-img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
      display: block;
    }
    #hover-card .card-emoji { font-size: 2rem; margin-bottom: 8px; }
    #hover-card .card-title { font-size: 1.1rem; font-weight: bold; color: #f9a825; margin-bottom: 4px; }
    #hover-card .card-category {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-weight: bold;
    }
    #hover-card .card-desc { font-size: 0.85rem; color: #b0c4de; line-height: 1.6; }
    #hover-card .card-hours { font-size: 0.78rem; color: #86efac; margin-top: 6px; }
    #hover-card .card-link { display: inline-block; margin-top: 8px; font-size: 0.75rem; color: #60a5fa; text-decoration: none; }
    #hover-card .card-link:hover { text-decoration: underline; }
    #hover-card .card-tip {
      margin-top: 10px;
      font-size: 0.75rem;
      color: #4ecdc4;
      border-top: 1px solid rgba(78,205,196,0.3);
      padding-top: 8px;
    }

    /* 設定ボタン */
    #settings-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ccc;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.72rem;
      white-space: nowrap;
      transition: background 0.2s;
      touch-action: manipulation;
      position: relative;
    }
    #settings-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    #settings-panel {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #1a3a5c;
      border: 1px solid rgba(249,168,37,0.4);
      border-radius: 10px;
      padding: 12px 14px;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 2000;
    }
    #settings-panel.open { display: block; }
    .settings-label {
      font-size: 0.7rem;
      color: #f9a825;
      font-weight: bold;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .style-options { display: flex; gap: 6px; flex-direction: column; }
    .style-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ccc;
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.78rem;
      text-align: left;
      transition: all 0.2s;
      touch-action: manipulation;
    }
    .style-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .style-btn.active { border-color: #f9a825; color: #f9a825; background: rgba(249,168,37,0.1); }
    #settings-wrapper { position: relative; }
  </style>
</head>

    desc: "Ala Moana Mall 3F #3312 (near Target)\n1450 Ala Moana Blvd, Honolulu HI 96814",
    hours: "Mon–Sun 10:00am–8:00pm",
    url: "https://nohohomehawaii.com/en-jp/pages/store-locator",
    image: "https://nohohomehawaii.com/cdn/shop/files/IMG_6105.jpg?v=1775063560&width=800"
  },
  // サーフィン
  { name: "Moku Hawaii", lat: 21.275838, lng: -157.8240839, category: "サーフィン", color: "#38bdf8", emoji: "🏄",
    desc: "2446 Koa Ave, Honolulu, HI 96815",
    hours: "毎日 6:00am–8:30pm",
    url: "https://mokuhawaii.surf",
    image: "https://mokuhawaii.surf/cdn/shop/files/moku-hawaii-surf-shop-waikiki.jpg"
  },
];

const CATEGORY_COLORS = {
  "観光スポット": "#ff6b6b",
  "グルメ": "#f9a825",
  "TikTok雑貨": "#a78bfa",
  "ビーチ": "#4ecdc4",
  "サーフィン": "#38bdf8",
};

// 地図初期化（オアフ島中心）
const map = L.map('map', {
  center: [21.3500, -157.9000],
  zoom: 11,
  zoomControl: true,
});

// 距離スケールバー（ズームに応じて自動調整）
L.control.scale({ position: 'bottomleft', imperial: false, metric: true }).addTo(map);

// タイルレイヤー管理
const TILE_STYLES = {
  dark: {
    url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    attr: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
    theme: 'dark'
  },
  light: {
    url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    attr: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
    theme: 'light'
  },
  standard: {
    url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    attr: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    theme: 'light'
  }
};

let currentTile = L.tileLayer(TILE_STYLES.dark.url, {
  attribution: TILE_STYLES.dark.attr, maxZoom: 19
}).addTo(map);

function setMapStyle(styleKey) {
  const style = TILE_STYLES[styleKey];
  if (!style) return;
  map.removeLayer(currentTile);
  currentTile = L.tileLayer(style.url, { attribution: style.attr, maxZoom: 19 }).addTo(map);
  document.body.classList.toggle('theme-light', style.theme === 'light');
  document.querySelectorAll('.style-btn').forEach(b => b.classList.toggle('active', b.dataset.style === styleKey));
}

const hoverCard = document.getElementById('hover-card');

function createMarkerIcon(color, emoji) {
  return L.divIcon({
    className: '',
    html: `
      <div style="
        width: 36px; height: 36px;
        background: ${color};
        border: 3px solid rgba(255,255,255,0.8);
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        box-shadow: 0 4px 15px ${color}88;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      ">
        <span style="
          display: block;
          transform: rotate(45deg);
          text-align: center;
          line-height: 30px;
          font-size: 16px;
        ">${emoji}</span>
      </div>
    `,
    iconSize: [36, 36],
    iconAnchor: [18, 36],
    popupAnchor: [0, -38],
  });
}

// マーカーを category ごとに保持
const markersByCategory = {};

SPOTS.forEach(spot => {
  const marker = L.marker([spot.lat, spot.lng], {
    icon: createMarkerIcon(spot.color, spot.emoji)
  }).addTo(map);

  if (!markersByCategory[spot.category]) markersByCategory[spot.category] = [];
  markersByCategory[spot.category].push(marker);


  function showCard() {
    if (window.matchMedia('(hover: none)').matches) return;
    document.getElementById('card-emoji').textContent = spot.emoji;
    document.getElementById('card-title').textContent = spot.name;
    const catEl = document.getElementById('card-category');
    catEl.textContent = spot.category;
    catEl.style.background = spot.color + '33';
    catEl.style.color = spot.color;
    catEl.style.border = `1px solid ${spot.color}55`;
    document.getElementById('card-desc').textContent = spot.desc;
    const imgEl = document.getElementById('card-img');
    if (spot.image) {
      imgEl.src = spot.image;
      imgEl.style.display = 'block';
    } else {
      imgEl.style.display = 'none';
    }
    const hoursEl = document.getElementById('card-hours');
    hoursEl.textContent = spot.hours ? '🕐 ' + spot.hours : '';
    const linkEl = document.getElementById('card-link');
    if (spot.url) {
      linkEl.href = spot.url;
      linkEl.textContent = '🔗 公式サイトを開く';
      linkEl.style.display = 'inline-block';
    } else {
      linkEl.style.display = 'none';
    }
    hoverCard.classList.add('visible');
  }

  // ホバー → 右下カード
  marker.on('mouseover', showCard);
  marker.on('mouseout', () => hoverCard.classList.remove('visible'));

  // クリック → 吹き出しポップアップ（フル情報）
  const popup = L.popup({ maxWidth: 260, className: '' }).setContent(() => {
    const img = spot.image ? `<img class="rich-popup-img" src="${spot.image}" alt="${spot.name}" />` : '';
    const hours = spot.hours ? `<div class="rich-popup-hours">🕐 ${spot.hours}</div>` : '';
    const link = spot.url ? `<a class="rich-popup-link" href="${spot.url}" target="_blank" rel="noopener">🔗 公式サイトを開く</a>` : '';
    return `
      ${img}
      <div class="rich-popup-body">
        <div class="rich-popup-emoji">${spot.emoji}</div>
        <div class="rich-popup-title">${spot.name}</div>
        <div class="rich-popup-category" style="background:${spot.color}33;color:${spot.color};border:1px solid ${spot.color}55">${spot.category}</div>
        <div class="rich-popup-desc">${spot.desc}</div>
        ${hours}${link}
      </div>`;
  });
  marker.bindPopup(popup);

  marker.on('click', function() {
    const targetZoom = 16;
    if (window.innerWidth <= 600) {
      // スマホ：ズーム後のピクセル空間でオフセットを事前計算してダイレクトに移動
      const targetPx = map.project(L.latLng(spot.lat, spot.lng), targetZoom);
      targetPx.y -= map.getSize().y * 0.22;
      map.flyTo(map.unproject(targetPx, targetZoom), targetZoom, { duration: 0.6 });
    } else {
      map.flyTo([spot.lat, spot.lng], targetZoom, { duration: 0.6 });
    }
  });
});

// ホテルビーコン（Aston at the Waikiki Banyan）
const HOTEL = { name: "🏨 Aston at the Waikiki Banyan", lat: 21.2745, lng: -157.8233 };

const hotelIcon = L.divIcon({
  className: '',
  html: `
    <div class="hotel-beacon">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="dot">🏨</div>
      <div class="hotel-label">宿泊ホテル</div>
    </div>
  `,
  iconSize: [20, 20],
  iconAnchor: [10, 10],
});

const hotelMarker = L.marker([HOTEL.lat, HOTEL.lng], { icon: hotelIcon, zIndexOffset: 1000 })
  .addTo(map)
  .on('click', () => map.flyTo([HOTEL.lat, HOTEL.lng], 16, { duration: 0.6 }));

function updateHotelLabel() {
  const label = hotelMarker.getElement()?.querySelector('.hotel-label');
  if (label) label.style.display = map.getZoom() >= 14 ? 'block' : 'none';
}
map.on('zoomend', updateHotelLabel);
updateHotelLabel();

// 集合場所ビーコン
const MEETUP = { name: "集合場所（バスターミナル）", lat: 21.2764, lng: -157.8175 };

const meetupIcon = L.divIcon({
  className: '',
  html: `
    <div class="hotel-beacon meetup-beacon">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="dot">🚌</div>
      <div class="meetup-label">集合場所</div>
    </div>
  `,
  iconSize: [20, 20],
  iconAnchor: [10, 10],
});

const meetupPopupContent = `
  <div style="text-align:center;margin-bottom:8px;">
    <img src="tenshi-meetup.jpg" alt="集合場所MAP" style="width:100%;border-radius:6px;" />
  </div>
  <div style="font-size:0.95rem;font-weight:bold;color:#34d399;margin-bottom:4px;">🚌 集合場所（バスターミナル）</div>
  <div style="font-size:0.8rem;color:#b0c4de;line-height:1.5;">WBM ワイキキビーチマリオット<br>パオアカラニ通り沿い バスターミナル</div>
`;

const meetupMarker = L.marker([MEETUP.lat, MEETUP.lng], { icon: meetupIcon, zIndexOffset: 999 })
  .addTo(map)
  .bindPopup(L.popup({ maxWidth: 300 }).setContent(meetupPopupContent))
  .on('click', function() {
    const targetZoom = 17;
    if (window.innerWidth <= 600) {
      const targetPx = map.project(L.latLng(MEETUP.lat, MEETUP.lng), targetZoom);
      targetPx.y -= map.getSize().y * 0.22;
      map.flyTo(map.unproject(targetPx, targetZoom), targetZoom, { duration: 0.6 });
    } else {
      map.flyTo([MEETUP.lat, MEETUP.lng], targetZoom, { duration: 0.6 });
    }
  });

// 設定パネル
const settingsBtn = document.getElementById('settings-btn');
const settingsPanel = document.getElementById('settings-panel');
settingsBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  settingsPanel.classList.toggle('open');
});
document.addEventListener('click', () => settingsPanel.classList.remove('open'));
settingsPanel.addEventListener('click', e => e.stopPropagation());
document.querySelectorAll('.style-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    setMapStyle(btn.dataset.style);
    settingsPanel.classList.remove('open');
  });
});

// ヘッダー折りたたみ
const toggleBtn = document.getElementById('toggle-header');
const headerEl = document.querySelector('header');
toggleBtn.addEventListener('click', () => {
  const collapsed = headerEl.classList.toggle('collapsed');
  toggleBtn.textContent = collapsed ? '▼ フィルター' : '▲ 閉じる';
});

// カテゴリフィルター（複数選択）
const activeCategories = new Set();

function applyFilter() {
  const allBtns = document.querySelectorAll('.legend-item');
  const filtering = activeCategories.size > 0;

  allBtns.forEach(b => {
    const isActive = activeCategories.has(b.dataset.category);
    b.classList.toggle('active', isActive);
    b.classList.toggle('dimmed', filtering && !isActive);
  });

  Object.entries(markersByCategory).forEach(([category, markers]) => {
    const show = !filtering || activeCategories.has(category);
    markers.forEach(m => {
      if (show) { if (!map.hasLayer(m)) map.addLayer(m); }
      else { if (map.hasLayer(m)) map.removeLayer(m); }
    });
  });

  hoverCard.classList.remove('visible');
}

document.querySelectorAll('.legend-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.category;
    if (activeCategories.has(cat)) activeCategories.delete(cat);
    else activeCategories.add(cat);
    applyFilter();
  });
});
</script>
</body>
